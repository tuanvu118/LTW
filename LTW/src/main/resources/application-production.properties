# Railway Production Profile
server.port=${PORT:8080}
# Các biến môi trường được ưu tiên - Railway tự inject khi link MySQL service
# Tham khảo: https://docs.railway.app/guides/mysql

# Railway MySQL variables: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:ltw}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT - BẮT BUỘC set trên Railway Variables
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:1800000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:1296000000}

# Cloudinary - set trên Railway Variables nếu dùng
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# CORS - Điền URL Frontend trên Railway Variables: CORS_ALLOWED_ORIGINS
# Ví dụ: https://your-fe.railway.app,https://your-fe.vercel.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
